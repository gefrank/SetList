<?xml version="1.0" encoding="UTF-8"?>
<!-- SetList app icon — twilight palette (indigo background, mist "card" + check).
     The check-in-a-card echoes the app's card UI and the "mark a session done"
     idea. This SVG is the master; icon-192.png / icon-512.png are rendered from
     this exact geometry. Content sits inside the central safe zone so the same
     art works as a maskable icon. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5C6FE0"/>
      <stop offset="1" stop-color="#4150C0"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed twilight background (square so the OS maskable shape masks cleanly) -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>

  <!-- Mist card, centered, well within the maskable safe zone -->
  <rect x="123" y="123" width="266" height="266" rx="48" fill="#F5F6FA"/>

  <!-- Indigo check mark -->
  <polyline points="175,260 232,318 340,200"
            fill="none" stroke="#4C5FD5" stroke-width="34"
            stroke-linecap="round" stroke-linejoin="round"/>
</svg>
